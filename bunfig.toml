[install]
exact = true

[test]
root = "./tests"
preload = ["./tests/test-preload.ts"]
coverage = true
coverageThreshold = { line = 0.95, function = 0.95, statement = 0.95 }
coverageReporter = ["text"]
# Files excluded from the coverage denominator. These CANNOT be exercised by the
# offline test suite, so counting them would force the threshold below what the
# offline tests can honestly reach:
#   - anthropic-agent-provider.ts is the ONLY network-bound module; its live
#     query() path (#buildOptions/#runQuery/generate) is verified by the
#     human-run live smoke test in the main thread (development-plan §5 network
#     note), not offline. Its pure exported helpers (resolveAuthEnv,
#     extractResult) ARE covered by tests/llm/anthropic-agent-provider.test.ts.
#   - demo/** is a runnable example, not library code, and is not imported by
#     any test.
#   - scripts/** are runnable drivers (e.g. the M0 live isambard proof), not
#     library code; they perform live, sandboxed Stryker runs and are never
#     imported by the offline test suite, so they cannot be covered offline.
#   - src/cli.ts and src/driver/run.ts import @stryker-mutator/core, whose
#     instrumenter throws `generator is not a function` under Bun, so they CANNOT
#     run under `bun test`; they are exercised only by the human-run live isambard
#     proof (the same Bun/Node wall as scripts/). Their PURE decision logic lives
#     in src/driver/{cli-args,plan,gate,select-mutators,config-reader}.ts, which IS
#     covered offline.
#   - tests/driver/fixtures/** are config-file FIXTURES (some .mjs) loaded by the
#     config-reader tests; they are test data, not product code.
coveragePathIgnorePatterns = [
    "src/llm/anthropic-agent-provider.ts",
    "src/cli.ts",
    "src/driver/run.ts",
    "demo/",
    "scripts/",
    "**/fixtures/**",
]
onlyFailures = true
timeout = 5
randomize = true
